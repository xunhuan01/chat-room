<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>聊天</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
      background: #f5f5f5;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .top-bar {
      background: #1a1a1a;
      color: #fff;
      padding: 16px 20px;
      text-align: center;
    }
    .top-bar h2 { font-size: 17px; font-weight: 500; }
    .top-bar p { font-size: 12px; color: #888; margin-top: 2px; }
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
    }
    .msg {
      margin-bottom: 16px;
      display: flex;
      flex-direction: column;
    }
    .msg.me {
      align-items: flex-end;
    }
    .msg.other {
      align-items: flex-start;
    }
    .bubble {
      max-width: 75%;
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.5;
      word-wrap: break-word;
    }
    .msg.me .bubble {
      background: #95ec69;
      color: #000;
      border-top-left-radius: 4px;
    }
    .msg.other .bubble {
      background: #fff;
      color: #333;
      border-top-right-radius: 4px;
    }
    .bubble img {
      max-width: 240px;
      max-height: 300px;
      border-radius: 8px;
      display: block;
      cursor: pointer;
    }
    .bubble .img-caption {
      font-size: 13px;
      margin-top: 6px;
    }
    .btn-img {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: #e0e0e0;
      color: #555;
      border: none;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .btn-img:hover { background: #ccc; }
    .btn-img:disabled { background: #eee; color: #bbb; cursor: default; }
    .time {
      font-size: 11px;
      color: #bbb;
      margin-top: 3px;
      padding: 0 4px;
    }
    .input-area {
      padding: 12px 16px 16px;
      background: #fff;
      border-top: 1px solid #e0e0e0;
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }
    .input-area input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #ddd;
      border-radius: 20px;
      font-size: 14px;
      outline: none;
    }
    .input-area input:focus { border-color: #00c853; }
    .input-area button {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: #00c853;
      color: #fff;
      border: none;
      cursor: pointer;
      font-size: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .input-area button:hover { background: #00a844; }
    .input-area button:disabled { background: #ccc; }
    .status {
      padding: 4px 16px;
      text-align: center;
      font-size: 11px;
      color: #aaa;
      background: #fff;
      border-top: 1px solid #f0f0f0;
    }
    .connecting {
      text-align: center;
      color: #999;
      font-size: 13px;
      padding: 40px 20px;
    }
  </style>
</head>
<body>
  <div class="top-bar">
    <h2 id="nameDisplay">正在连接...</h2>
    <p>有什么想说的，直接说吧</p>
  </div>
  <div class="messages" id="messages">
    <div class="connecting">正在连接客服，请稍候...</div>
  </div>
  <div class="input-area">
    <input type="text" id="input" placeholder="输入消息..." disabled>
    <button class="btn-img" id="imgBtn" disabled>📷</button>
    <button id="sendBtn" disabled>↑</button>
    <input type="file" id="imageInput" accept="image/*" hidden>
  </div>
  <div class="status" id="status">正在连接...</div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io({ query: { role: 'visitor' } });
    const msgEl = document.getElementById('messages');
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('sendBtn');
    const nameDisplay = document.getElementById('nameDisplay');
    const statusEl = document.getElementById('status');
    const imgBtn = document.getElementById('imgBtn');
    const imageInput = document.getElementById('imageInput');
    let myName = '你';
    
    function fmt(iso) {
      const d = new Date(iso);
      const now = new Date();
      if (d.toDateString() === now.toDateString())
        return d.toTimeString().slice(0, 5);
      return d.toLocaleDateString('zh-CN', {month:'2-digit',day:'2-digit'}) + ' ' + d.toTimeString().slice(0, 5);
    }
    function esc(s) {
      return s.replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
    }
    function addMsg(from, text, time, type, url) {
      const cls = from === 'me' ? 'msg me' : 'msg other';
      const d = document.createElement('div');
      d.className = cls;
      let html = '<div class="bubble">';
      if (type === 'image' && url) {
        html += '<img src="' + url + '" onclick="window.open(this.src)" alt="图片">';
        if (text) html += '<div class="img-caption">' + esc(text) + '</div>';
      } else {
        html += esc(text);
      }
      html += '</div><div class="time">' + fmt(time) + '</div>';
      d.innerHTML = html;
      msgEl.appendChild(d);
      msgEl.scrollTop = msgEl.scrollHeight;
    }
    
    socket.on('welcome', (data) => {
      myName = data.name;
      nameDisplay.textContent = '正在与客服对话';
      input.disabled = false;
      sendBtn.disabled = false;
      input.focus();
      msgEl.innerHTML = '';
      addMsg('other', '你好，已连接到客服。有什么想说的？', new Date().toISOString());
      
      // Save visitor ID cookie for returning visits
      if (data.visitorId) {
        var d = new Date();
        d.setFullYear(d.getFullYear() + 10); // never expires
        document.cookie = 'visitorId=' + data.visitorId + '; expires=' + d.toUTCString() + '; path=/; SameSite=Lax';
      }
    });
    
    socket.on('chat-history', (messages) => {
      msgEl.innerHTML = '';
      for (const msg of messages) {
        if (msg.from === 'visitor') {
          addMsg('me', msg.text, msg.timestamp, msg.type, msg.url);
        } else {
          addMsg('other', msg.text, msg.timestamp, msg.type, msg.url);
        }
      }
    });

    socket.on('admin-message', (data) => {
      addMsg('other', data.text, new Date().toISOString(), data.type, data.url);
    });
    
    socket.on('connect', () => {
      statusEl.textContent = '在线';
      input.disabled = false;
      sendBtn.disabled = false;
      imgBtn.disabled = false;
    });
    socket.on('disconnect', () => {
      statusEl.textContent = '连接断开，正在重连...';
      input.disabled = true;
      sendBtn.disabled = true;
      imgBtn.disabled = true;
    });
    socket.on('connect_error', () => {
      statusEl.textContent = '连接失败，请刷新页面';
    });
    
    function send() {
      const text = input.value.trim();
      if (!text) return;
      socket.emit('visitor-message', { text });
      addMsg('me', text, new Date().toISOString());
      input.value = '';
    }
    sendBtn.onclick = send;
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') send();
    });

    // Image upload
    imgBtn.onclick = () => imageInput.click();
    imageInput.onchange = async () => {
      const file = imageInput.files[0];
      if (!file) return;
      const form = new FormData();
      form.append('image', file);
      try {
        const resp = await fetch('/upload', { method: 'POST', body: form });
        const data = await resp.json();
        if (data.url) {
          socket.emit('visitor-message', { type: 'image', url: data.url, text: '' });
          addMsg('me', '', new Date().toISOString(), 'image', data.url);
        }
      } catch (e) { alert('图片上传失败'); }
      imageInput.value = '';
    };
  </script>
</body>
</html>
