<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>聊天</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
      background: #f5f5f5;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }
    .top-bar {
      background: #1a1a1a;
      color: #fff;
      padding: 8px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .top-bar .status-left {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 14px;
      font-weight: 500;
    }
    .top-bar .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #2ecc71;
      display: inline-block;
    }
    .top-bar .expire {
      font-size: 11px;
      color: #888;
    }
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
    }
    .msg {
      margin-bottom: 16px;
      display: flex;
      flex-direction: column;
    }
    .msg.me {
      align-items: flex-end;
    }
    .msg.other {
      align-items: flex-start;
    }
    .bubble {
      max-width: 75%;
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.5;
      word-wrap: break-word;
    }
    .msg.me .bubble {
      background: #95ec69;
      color: #000;
      border-top-left-radius: 4px;
    }
    .msg.other .bubble {
      background: #fff;
      color: #333;
      border-top-right-radius: 4px;
    }
    .bubble img {
      max-width: 240px;
      max-height: 300px;
      border-radius: 8px;
      display: block;
      cursor: pointer;
    }
    .bubble .img-caption {
      font-size: 13px;
      margin-top: 6px;
    }
    .btn-img {
          width: 40px;
          height: 40px;
          border-radius: 50%;
          background: #f0f0f0;
          color: #888;
          border: none;
          cursor: pointer;
          display: flex;
          align-items: center;
          justify-content: center;
          flex-shrink: 0;
          transition: background 0.15s;
        }
        .btn-img:hover { background: #e0e0e0; }
        .btn-img:disabled { background: #f5f5f5; color: #ccc; cursor: default; }
    .time {
      font-size: 11px;
      color: #bbb;
      margin-top: 3px;
      padding: 0 4px;
    }
    .input-area {
      padding: 12px 16px 16px;
      background: #fff;
      border-top: 1px solid #e0e0e0;
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }
    .input-area input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #ddd;
      border-radius: 20px;
      font-size: 14px;
      outline: none;
    }
    .input-area input:focus { border-color: #00c853; }
    .input-area button {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: #00c853;
      color: #fff;
      border: none;
      cursor: pointer;
      font-size: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .input-area button:hover { background: #00a844; }
    .input-area button:disabled { background: #ccc; }
    .status {
      padding: 4px 16px;
      text-align: center;
      font-size: 11px;
      color: #aaa;
      background: #fff;
      border-top: 1px solid #f0f0f0;
    }
    .img-placeholder { position: relative; display: inline-block; }
    .img-placeholder img { display: block; max-width: 240px; max-height: 300px; border-radius: 8px; }
    .img-placeholder .overlay {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.35); color: #fff;
      font-size: 13px; font-weight: 500;
      border-radius: 8px;
      text-shadow: 0 1px 3px rgba(0,0,0,0.6);
    }
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: inline-block; margin-right: 6px; vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .bubble .err { color: #c0392b; font-size: 13px; padding: 6px 2px; }
    .connecting {
      text-align: center;
      color: #999;
      font-size: 13px;
      padding: 40px 20px;
    }
  </style>
</head>
<body>
  <div class="top-bar">
      <div class="status-left">
        <span class="dot"></span>
        <span>客服在线</span>
      </div>
      <span class="expire">消息72h后销毁</span>
    </div>
  <div class="messages" id="messages">
    <div class="connecting">正在连接客服，初次连接需要 3~5 秒，请耐心等待...</div>
  </div>
  <div class="input-area">
    <input type="text" id="input" placeholder="输入消息..." 
           autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" disabled>
    <button class="btn-img" id="imgBtn" disabled>
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
        <circle cx="12" cy="13" r="4"/>
      </svg>
    </button>
    <button id="sendBtn" disabled>↑</button>
    <input type="file" id="imageInput" accept="image/*" hidden>
  </div>
  <div class="status" id="status">初次连接需要 3~5 秒，请耐心等待...</div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io({ query: { role: 'visitor' } });
    const msgEl = document.getElementById('messages');
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('sendBtn');
    const statusEl = document.getElementById('status');
    const imgBtn = document.getElementById('imgBtn');
    const imageInput = document.getElementById('imageInput');
    let myName = '你';
    
    function fmt(iso) {
      const d = new Date(iso);
      const now = new Date();
      if (d.toDateString() === now.toDateString())
        return d.toTimeString().slice(0, 5);
      return d.toLocaleDateString('zh-CN', {month:'2-digit',day:'2-digit'}) + ' ' + d.toTimeString().slice(0, 5);
    }
    function esc(s) {
      return s.replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
    }
    function addMsg(from, text, time, type, url) {
      const cls = from === 'me' ? 'msg me' : 'msg other';
      const d = document.createElement('div');
      d.className = cls;
      let html = '<div class="bubble">';
      if (type === 'image' && url) {
        html += '<img src="' + url + '" onclick="window.open(this.src)" alt="图片">';
        if (text) html += '<div class="img-caption">' + esc(text) + '</div>';
      } else {
        html += esc(text);
      }
      html += '</div><div class="time">' + fmt(time) + '</div>';
      d.innerHTML = html;
      msgEl.appendChild(d);
      msgEl.scrollTop = msgEl.scrollHeight;
    }
    
    socket.on('welcome', (data) => {
      myName = data.name;
      input.disabled = false;
      sendBtn.disabled = false;
      input.focus();
      msgEl.innerHTML = '';
      addMsg('other', '你好，已连接到客服。有什么想说的？', new Date().toISOString());
      
      // Save visitor ID cookie for returning visits
      if (data.visitorId) {
        var d = new Date();
        d.setFullYear(d.getFullYear() + 10); // never expires
        document.cookie = 'visitorId=' + data.visitorId + '; expires=' + d.toUTCString() + '; path=/; SameSite=Lax';
      }
    });
    
    socket.on('chat-history', (messages) => {
      msgEl.innerHTML = '';
      for (const msg of messages) {
        if (msg.from === 'visitor') {
          addMsg('me', msg.text, msg.timestamp, msg.type, msg.url);
        } else {
          addMsg('other', msg.text, msg.timestamp, msg.type, msg.url);
        }
      }
    });

    socket.on('admin-message', (data) => {
      addMsg('other', data.text, new Date().toISOString(), data.type, data.url);
    });
    
    socket.on('connect', () => {
      statusEl.textContent = '在线';
      input.disabled = false;
      sendBtn.disabled = false;
      imgBtn.disabled = false;
    });
    socket.on('disconnect', () => {
      statusEl.textContent = '连接断开，正在重连...';
      input.disabled = true;
      sendBtn.disabled = true;
      imgBtn.disabled = true;
    });
    socket.on('connect_error', () => {
      statusEl.textContent = '连接失败，请刷新页面';
    });
    
    function send() {
      const text = input.value.trim();
      if (!text) return;
      socket.emit('visitor-message', { text });
      addMsg('me', text, new Date().toISOString());
      input.value = '';
    }
    sendBtn.onclick = send;
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') send();
    });

    // Image upload
    imgBtn.onclick = () => imageInput.click();
    async function compressImage(file, maxW = 1280, maxH = 1280, quality = 0.7) {
      if (file.size < 200 * 1024) return file;
      return new Promise((resolve) => {
        const img = new Image();
        const url = URL.createObjectURL(file);
        img.onload = () => {
          URL.revokeObjectURL(url);
          let w = img.width, h = img.height;
          if (w > maxW || h > maxH) {
            const ratio = Math.min(maxW / w, maxH / h);
            w = Math.round(w * ratio); h = Math.round(h * ratio);
          }
          const canvas = document.createElement('canvas');
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          const outType = file.type === 'image/png' ? 'image/png' : 'image/jpeg';
          canvas.toBlob((blob) => {
            if (!blob) { resolve(file); return; }
            const newName = file.name.replace(/\.\w+$/, outType === 'image/png' ? '.png' : '.jpg');
            resolve(new File([blob], newName, { type: outType }));
          }, outType, quality);
        };
        img.onerror = () => resolve(file);
        img.src = url;
      });
    }

    imageInput.onchange = async () => {
      const file = imageInput.files[0];
      if (!file) return;
      imgBtn.disabled = true;
      const localUrl = URL.createObjectURL(file);
      const phDiv = document.createElement('div');
      phDiv.className = 'msg me';
      phDiv.innerHTML = '<div class="bubble"><div class="img-placeholder"><img src="' + localUrl + '" style="opacity:0.4"><div class="overlay"><span class="spinner"></span>发送中…</div></div></div><div class="time">' + fmt(new Date().toISOString()) + '</div>';
      msgEl.appendChild(phDiv);
      msgEl.scrollTop = msgEl.scrollHeight;
      try {
        const compressed = await compressImage(file);
        const form = new FormData();
        form.append('image', compressed);
        await new Promise((resolve, reject) => {
          const xhr = new XMLHttpRequest();
          xhr.upload.onprogress = (e) => {
            if (e.lengthComputable) {
              const pct = Math.round(e.loaded / e.total * 100);
              const ov = phDiv.querySelector('.overlay');
              if (ov) ov.innerHTML = '<span class="spinner"></span>' + pct + '%';
            }
          };
          xhr.onload = () => {
            if (xhr.status >= 200 && xhr.status < 300) {
              try {
                const data = JSON.parse(xhr.responseText);
                if (data.url) {
                  socket.emit('visitor-message', { type: 'image', url: data.url, text: '' });
                  phDiv.querySelector('.bubble').innerHTML = '<img src="' + data.url + '" onclick="window.open(this.src)" alt="图片">';
                  URL.revokeObjectURL(localUrl);
                  resolve();
                } else {
                  reject(new Error(data.error || '上传失败'));
                }
              } catch (e) { reject(e); }
            } else { reject(new Error('HTTP ' + xhr.status)); }
          };
          xhr.onerror = () => reject(new Error('网络错误'));
          xhr.open('POST', '/upload', true);
          xhr.send(form);
        });
      } catch (e) {
        console.error('Image upload failed:', e);
        const bubble = phDiv.querySelector('.bubble');
        if (bubble) bubble.innerHTML = '<div class="err">❌ 发送失败</div>';
        URL.revokeObjectURL(localUrl);
      } finally {
        imgBtn.disabled = false;
        imageInput.value = '';
      }
    };
  </script>
</body>
</html>
