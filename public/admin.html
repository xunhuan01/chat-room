<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>客服面板</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif; height: 100vh; display: flex; }
    .sidebar {
      width: 260px;
      background: #1a1a1a;
      color: #fff;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #2a2a2a;
    }
    .sidebar-header {
      padding: 16px 18px;
      border-bottom: 1px solid #2a2a2a;
      font-size: 15px;
      font-weight: 600;
    }
    .sidebar-header span { color: #888; font-weight: 400; }
    .visitor-list { flex: 1; overflow-y: auto; }
    .v-item {
      padding: 12px 18px;
      cursor: pointer;
      border-bottom: 1px solid #222;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: background 0.1s;
    }
    .v-item:hover { background: #2a2a2a; }
    .v-item.active { background: #1a3a5a; }
    .v-avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 13px; font-weight: 600;
      flex-shrink: 0;
    }
    .v-info { flex: 1; min-width: 0; }
    .v-name { font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .v-time { font-size: 11px; color: #666; margin-top: 2px; }
    .badge {
      background: #e74c3c; color: #fff;
      border-radius: 10px; padding: 1px 7px;
      font-size: 11px; font-weight: 600;
    }
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #e8e8e8;
    }
    .chat-header {
      padding: 14px 20px;
      background: #fff;
      border-bottom: 1px solid #ddd;
      font-weight: 600;
      font-size: 15px;
    }
    .chat-header small { font-weight: 400; color: #999; font-size: 13px; }
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }
    .msg {
      margin-bottom: 16px;
      display: flex;
      flex-direction: column;
    }
    .msg.me {
      align-items: flex-end;
    }
    .msg.other {
      align-items: flex-start;
    }
    .bubble {
      max-width: 70%;
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.5;
      word-wrap: break-word;
    }
    .msg.me .bubble {
      background: #95ec69;
      color: #000;
      border-top-right-radius: 4px;
    }
    .msg.other .bubble {
      background: #fff;
      color: #333;
      border-top-left-radius: 4px;
    }
    .bubble img {
      max-width: 240px;
      max-height: 300px;
      border-radius: 8px;
      display: block;
      cursor: pointer;
    }
    .bubble .img-caption {
      font-size: 13px;
      margin-top: 6px;
    }
    .btn-img {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: #e0e0e0;
      color: #555;
      border: none;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .btn-img:hover { background: #ccc; }
    .btn-img:disabled { background: #eee; color: #bbb; cursor: default; }
    .time {
      font-size: 11px;
      color: #aaa;
      margin-top: 3px;
      padding: 0 4px;
    }
    .empty-state {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #999;
      font-size: 14px;
    }
    .input-area {
      padding: 12px 20px 16px;
      background: #fff;
      border-top: 1px solid #ddd;
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }
    .input-area input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #ccc;
      border-radius: 20px;
      font-size: 14px;
      outline: none;
    }
    .input-area input:focus { border-color: #0084ff; }
    .input-area button {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: #0084ff;
      color: #fff;
      border: none;
      cursor: pointer;
      font-size: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .input-area button:hover { background: #0066cc; }
    .input-area button:disabled { background: #ccc; cursor: default; }
  </style>
</head>
<body>
  <div class="sidebar">
    <div class="sidebar-header">访客 <span id="count">0</span></div>
    <div class="visitor-list" id="list"></div>
  </div>
  <div class="main">
    <div class="chat-header" id="header">选择一个访客 <small>开始对话</small></div>
    <div class="messages" id="messages">
      <div class="empty-state">点击左侧访客开始聊天</div>
    </div>
    <div class="input-area">
      <input type="text" id="input" placeholder="输入回复..." disabled>
      <button class="btn-img" id="imgBtn" disabled>📷</button>
      <button id="sendBtn" disabled>↑</button>
      <input type="file" id="imageInput" accept="image/*" hidden>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io({ query: { role: 'admin' } });
    let current = null;
    const msgs = new Map(); // visitorId -> [{from, text, time, type?, url?}]
    const unread = new Map();
    const visitors = new Map(); // visitorId -> {name, color, createdAt}
    const imgBtn = document.getElementById('imgBtn');
    const imageInput = document.getElementById('imageInput');

    const list = document.getElementById('list');
    const count = document.getElementById('count');
    const header = document.getElementById('header');
    const messages = document.getElementById('messages');
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('sendBtn');

    function fmt(iso) {
      const d = new Date(iso);
      const now = new Date();
      if (d.toDateString() === now.toDateString())
        return d.toTimeString().slice(0, 5);
      return d.toLocaleDateString('zh-CN', {month:'2-digit',day:'2-digit'}) + ' ' + d.toTimeString().slice(0, 5);
    }
    function esc(s) { return s.replace(/[&<>"']/g, c => ({'&':'&','<':'<','>':'>','"':'"',"'":'&#39;'}[c])); }

    function renderList() {
      count.textContent = visitors.size;
      list.innerHTML = '';
      visitors.forEach((info, id) => {
        const item = document.createElement('div');
        item.className = 'v-item' + (id === current ? ' active' : '');
        const u = unread.get(id) || 0;
        item.innerHTML = `
          <div class="v-avatar" style="background:${info.color}">${info.name.slice(-2)}</div>
          <div class="v-info">
            <div class="v-name">${info.name}</div>
            <div class="v-time">${fmt(info.createdAt)}</div>
          </div>
          ${u > 0 ? `<div class="badge">${u}</div>` : ''}
        `;
        item.onclick = () => select(id);
        list.appendChild(item);
      });
    }

    function renderMsgs() {
      if (!current) {
        messages.innerHTML = '<div class="empty-state">点击左侧访客开始聊天</div>';
        return;
      }
      const list = msgs.get(current) || [];
      messages.innerHTML = list.map(m => {
        let bubble = '<div class="bubble">';
        if (m.type === 'image' && m.url) {
          bubble += '<img src="' + m.url + '" onclick="window.open(this.src)" alt="图片">';
          if (m.text) bubble += '<div class="img-caption">' + esc(m.text) + '</div>';
        } else {
          bubble += esc(m.text);
        }
        bubble += '</div>';
        return '<div class="msg ' + m.from + '">' + bubble + '<div class="time">' + fmt(m.time) + '</div></div>';
      }).join('');
      messages.scrollTop = messages.scrollHeight;
    }

    function select(id) {
      current = id;
      unread.set(id, 0);
      const info = visitors.get(id);
      header.innerHTML = info ? info.name : '未知访客';
      input.disabled = false;
      sendBtn.disabled = false;
      renderList();
      renderMsgs();
      input.focus();
    }

    const visitedByLegacy = new Map(); // legacyId -> persistent key (legacyId or socketId)

    function getKey(v) {
      return (v.legacyId && v.legacyId !== '') ? v.legacyId : v.id;
    }

    socket.on('sessions', (sessions) => {
      sessions.forEach(s => {
        const key = s.id;
        visitors.set(key, { id: s.id, name: s.name, color: s.color, createdAt: s.createdAt, legacyId: '' });
      });
      renderList();
    });
    socket.on('visitor-joined', (v) => {
      const key = v.legacyId || v.id;
      // Deduplicate: same legacyId = same visitor, just update socket id
      if (visitors.has(key)) {
        const existing = visitors.get(key);
        existing.id = v.id; // update to newest socket id
        // Remap msgs/unread from old id mapping if needed
        if (v.legacyId && v.id !== key) {
          if (msgs.has(key)) { msgs.set(v.id, msgs.get(key)); msgs.delete(key); }
          if (unread.has(key)) { unread.set(v.id, unread.get(key)); unread.delete(key); }
          visitors.delete(key);
          visitors.set(v.id, existing);
          if (current === key) current = v.id;
        }
      } else {
        visitors.set(key, { id: v.id, name: v.name, color: v.color, createdAt: v.createdAt, legacyId: v.legacyId || '' });
      }
      renderList();
    });
    socket.on('visitor-left', (data) => {
      const vid = data.visitorId;
      // Find the visitor entry with this socket id
      let keyToDelete = null;
      for (const [key, info] of visitors) {
        if (info.id === vid) {
          keyToDelete = key;
          break;
        }
      }
      if (keyToDelete) {
        visitors.delete(keyToDelete);
        msgs.delete(keyToDelete);
        unread.delete(keyToDelete);
        if (current === keyToDelete) {
          current = null;
          header.innerHTML = '选择一个访客';
          input.disabled = true;
          sendBtn.disabled = true;
          renderMsgs();
        }
      }
      renderList();
    });
    socket.on('visitor-message', (data) => {
      const { visitorId, visitorName, visitorColor, text, timestamp, type, url } = data;
      // Find visitor by socket id in case they reconnected
      let found = false;
      for (const [key, info] of visitors) {
        if (info.id === visitorId) {
          if (!msgs.has(key)) msgs.set(key, []);
          msgs.get(key).push({ from: 'other', text, time: timestamp, type: type || 'text', url: url || '' });
          if (current !== key) unread.set(key, (unread.get(key) || 0) + 1);
          found = true;
          if (current === key) renderMsgs();
          break;
        }
      }
      if (!found) {
        // New visitor from message (edge case)
        const key = visitorId;
        visitors.set(key, { id: visitorId, name: visitorName, color: visitorColor, createdAt: timestamp, legacyId: '' });
        if (!msgs.has(key)) msgs.set(key, []);
        msgs.get(key).push({ from: 'other', text, time: timestamp, type: type || 'text', url: url || '' });
        unread.set(key, (unread.get(key) || 0) + 1);
      }
      renderList();
    });

    function send() {
      const text = input.value.trim();
      if (!text || !current) return;
      socket.emit('admin-message', { visitorId: current, text });
      if (!msgs.has(current)) msgs.set(current, []);
      msgs.get(current).push({ from: 'me', text, time: new Date().toISOString() });
      input.value = '';
      renderMsgs();
    }
    sendBtn.onclick = send;
    input.addEventListener('keydown', (e) => { if (e.key === 'Enter') send(); });

    // Image upload
    imgBtn.onclick = () => imageInput.click();
    imageInput.onchange = async () => {
      const file = imageInput.files[0];
      if (!file || !current) return;
      const form = new FormData();
      form.append('image', file);
      try {
        const resp = await fetch('/upload', { method: 'POST', body: form });
        const data = await resp.json();
        if (data.url) {
          socket.emit('admin-message', { visitorId: current, type: 'image', url: data.url, text: '' });
          if (!msgs.has(current)) msgs.set(current, []);
          msgs.get(current).push({ from: 'me', text: '', time: new Date().toISOString(), type: 'image', url: data.url });
          renderMsgs();
        }
      } catch (e) { alert('图片上传失败'); }
      imageInput.value = '';
    };
  </script>
</body>
</html>
